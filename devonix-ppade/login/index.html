<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ | PPAde</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="login-page">
  <main class="auth-shell">
    <div class="login-visual" aria-hidden="true">
      <img class="login-frame" src="../assets/Frame.svg" alt="">
      <img class="login-meaw" src="../assets/Meaw.png" alt="">
    </div>

    <section class="auth-card">
      <div class="auth-head">
        <p class="brand-chip"><span class="brand-dot" aria-hidden="true"></span>DEVONIX</p>
        <h1>เข้าสู่ระบบ</h1>
        <p class="subtitle">ยินดีต้อนรับเข้าสู่ DEVONIX</p>
      </div>

      <form id="login-form" class="auth-form" novalidate>
        <div class="field-block">
          <label for="email">อีเมล</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="field-block">
          <label for="password">รหัสผ่าน</label>
          <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button
              id="password-toggle"
              class="password-toggle"
              type="button"
              aria-controls="password"
              aria-pressed="false"
              aria-label="แสดงรหัสผ่าน"
              title="แสดงรหัสผ่าน"
            >
              <span class="sr-only password-toggle-text">แสดงรหัสผ่าน</span>
              <svg class="icon icon-eye" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path
                  d="M1.5 12s3.9-6.5 10.5-6.5S22.5 12 22.5 12s-3.9 6.5-10.5 6.5S1.5 12 1.5 12Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <circle
                  cx="12"
                  cy="12"
                  r="3"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
              </svg>
              <svg class="icon icon-eye-off" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path
                  d="M3.8 3.8 20.2 20.2"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M9.7 5.9c.8-.2 1.5-.4 2.3-.4 6.6 0 10.5 6.5 10.5 6.5a17.2 17.2 0 0 1-3.9 4.4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M6.4 8a17.3 17.3 0 0 0-4.9 4s3.9 6.5 10.5 6.5c1.8 0 3.4-.5 4.8-1.2"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </div>

        <button id="login-submit" class="primary" type="submit">เข้าสู่ระบบ</button>
      </form>

      <p id="login-message" class="message" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="./login.js" defer></script>
</body>
</html>
