<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จัดการผู้ใช้ | PPA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="users-page">
  <div class="shell">
    <nav class="nav">
      <div class="nav-links">
        <a class="nav-link" href="../index.html">
          <span class="home-icon" aria-hidden="true"></span>
          <span data-i18n="nav.home">Home</span>
        </a>
        <a class="nav-link active" href="./index.html">
          <span data-i18n="nav.users">Users</span>
        </a>
      </div>
      <button class="lang-toggle" data-lang-toggle="th" type="button" aria-label="Change language"></button>
      <div class="nav-auth">
        <span id="auth-user" class="pill auth-user"></span>
        <button id="logout-btn" class="small-btn nav-logout" type="button" data-i18n="nav.logout">ออกจากระบบ</button>
      </div>
    </nav>

    <section class="users-toolbar">
      <div>
        <h1 data-i18n="users.page.title">จัดการผู้ใช้</h1>
      </div>
      <div class="users-toolbar-actions">
        <button id="refresh-users" type="button" data-i18n="users.action.refresh">รีเฟรช</button>
        <button id="open-create-user" class="primary" type="button" data-i18n="users.action.add">เพิ่มผู้ใช้</button>
      </div>
    </section>

    <div class="table-wrap users-table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width: 70px;" data-i18n="users.col.id">ID</th>
            <th style="width: 220px;" data-i18n="users.col.email">Email</th>
            <th data-i18n="users.col.name">Name</th>
            <th style="width: 130px;" data-i18n="users.col.role">Role</th>
            <th style="width: 110px;" data-i18n="users.col.status">Status</th>
            <th style="width: 190px;" data-i18n="users.col.last_login">Last Login</th>
            <th style="width: 220px;" data-i18n="users.col.action">Action</th>
          </tr>
        </thead>
        <tbody id="user-rows">
          <tr><td class="empty" colspan="7" data-i18n="common.loading">กำลังโหลด...</td></tr>
        </tbody>
      </table>
    </div>

    <p id="users-message" class="users-message muted" role="status" aria-live="polite"></p>
  </div>

  <div class="modal hidden" id="user-create-modal" role="dialog" aria-modal="true">
    <div class="modal-content small">
      <div class="modal-header">
        <div class="users-modal-title-wrap">
          <h3 id="user-modal-title" data-i18n="users.modal.title.add">เพิ่มผู้ใช้</h3>
          <p id="user-edit-id" class="muted users-edit-id hidden"></p>
        </div>
        <button class="ghost icon-btn" id="user-create-close" data-i18n-aria-label="common.close" aria-label="ปิด">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <form id="user-create-form" class="modal-body" novalidate>
        <div class="field">
          <label for="new-user-email"><span data-i18n="users.field.email">Email</span> <span class="req-star">*</span></label>
          <input id="new-user-email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="new-user-password" id="new-user-password-label"><span data-i18n="users.field.password">Password</span> <span class="req-star">*</span></label>
          <input id="new-user-password" type="password" autocomplete="new-password" required />
        </div>
        <div class="field">
          <label for="new-user-name"><span data-i18n="users.field.name">Name</span> <span class="req-star">*</span></label>
          <input id="new-user-name" type="text" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="new-user-role" data-i18n="users.field.role">Role</label>
          <select id="new-user-role">
            <option value="admin">admin</option>
            <option value="superadmin">superadmin</option>
          </select>
        </div>
        <div class="field" id="new-user-sites-field">
          <label data-i18n="users.field.plant">Plant (สำหรับ admin)</label>
          <input
            id="new-user-sites-search"
            type="search"
            data-i18n-placeholder="users.search.placeholder"
            placeholder="ค้นหา"
            autocomplete="off"
          />
          <div id="new-user-sites-list" class="users-sites-list" role="group" aria-describedby="new-user-sites-hint"></div>
          <p class="muted users-sites-hint" id="new-user-sites-hint"></p>
        </div>
        <div class="field">
          <label for="new-user-active" data-i18n="users.field.status">สถานะ</label>
          <select id="new-user-active">
            <option value="1" data-i18n="users.status.active">active</option>
            <option value="0" data-i18n="users.status.inactive">inactive</option>
          </select>
        </div>
      </form>
      <div class="modal-footer">
        <button class="ghost small-btn" id="user-create-cancel" type="button" data-i18n="bill.action.cancel">ยกเลิก</button>
        <button class="primary" id="user-create-submit" type="submit" form="user-create-form" data-i18n="plant_modal.action.save">บันทึก</button>
      </div>
    </div>
  </div>

  <script src="../assets/i18n.js" defer></script>
  <script src="./users.js" defer></script>
</body>
</html>
